services:
  - type: web
    name: chandan-portfolio
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_SITE_URL
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        sync: false
      - key: DB_SSL_REJECT_UNAUTHORIZED
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_ON_CONTACT
        value: true
      - key: ALERT_ON_REVIEW
        value: true
      - key: ALERT_ON_VISIT
        value: true
      - key: ALERT_VISIT_THROTTLE_MINUTES
        value: 0
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_SECURE
        value: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_CONNECTION_TIMEOUT_MS
        value: 12000
